name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build & smoke-test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Build sdist and wheel
        run: uv build

      - name: Install as a uv tool
        run: uv tool install . --python ${{ matrix.python-version }}

      - name: Verify CLI — version matches pyproject.toml
        run: |
          expected=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          actual=$(cb --version)
          echo "expected: $expected"
          echo "actual:   $actual"
          test "$actual" = "$expected"

      - name: Verify CLI — help
        run: cb --help

      - name: Verify CLI — banner (no args)
        run: |
          expected=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          cb | grep -q "company-brain ${expected}"

      - name: Lint with ruff
        run: uv run --extra dev ruff check src tests

      - name: Run pytest
        run: uv run --extra dev pytest -q
